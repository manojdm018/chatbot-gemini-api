<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .chatbox {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .messages {
      height: 450px;
      overflow-y: auto;
      padding: 16px;
      background: #f8fafc;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 75%;
      line-height: 1.4;
    }

    .user {
      background: #0f172a;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
      border: 1px solid #cbd5e1;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #e2e8f0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chatbox">
    <div class="header">Gemini Chatbot</div>
    <div class="messages" id="messages">
      <div class="message bot">Hello! Ask me anything.</div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.textContent = text;
      messages.appendChild(userDiv);

      input.value = "";

      const botLoading = document.createElement("div");
      botLoading.className = "message bot";
      botLoading.textContent = "Typing...";
      messages.appendChild(botLoading);

      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("http://localhost:3001/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        botLoading.textContent = data.reply || data.error || "No response";
      } catch (error) {
        botLoading.textContent = "Error connecting to server";
      }

      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
