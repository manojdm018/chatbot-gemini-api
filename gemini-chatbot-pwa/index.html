<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-solid: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.22);
      --user: #0f172a;
      --bot: #ffffff;
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #e0f2fe 0%, transparent 30%),
        radial-gradient(circle at top right, #ede9fe 0%, transparent 28%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .chatbox {
      width: 100%;
      max-width: 820px;
      height: 88vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.55);
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-left p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 80%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 15px;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .message.bot p {
      margin: 0 0 10px;
    }

    .message.bot p:last-child {
      margin-bottom: 0;
    }

    .message.bot h1,
    .message.bot h2,
    .message.bot h3 {
      margin: 12px 0 8px;
      line-height: 1.3;
      font-weight: 700;
    }

    .message.bot h1 {
      font-size: 22px;
    }

    .message.bot h2 {
      font-size: 19px;
    }

    .message.bot h3 {
      font-size: 16px;
    }

    .message.bot ul,
    .message.bot ol {
      margin: 8px 0 10px 22px;
      padding: 0;
    }

    .message.bot li {
      margin-bottom: 6px;
    }

    .message.bot strong {
      font-weight: 700;
    }

    .message.bot code {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    .message.bot pre {
      background: #0f172a;
      color: #f8fafc;
      padding: 14px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 10px 0;
      font-size: 13px;
      line-height: 1.5;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.55);
    }

    input {
      flex: 1;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    button {
      border: none;
      background: #0f172a;
      color: white;
      padding: 0 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:active {
      transform: scale(0.98);
    }

    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.25);
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .chatbox {
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }

      .header {
        padding: 18px 16px;
      }

      .messages {
        padding: 18px 16px;
      }

      .message {
        max-width: 90%;
      }

      .input-area {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="chatbox">
    <div class="header">
      <div class="header-left">
        <h1>Gemini Chatbot</h1>
        <p>Minimal and modern AI chat interface</p>
      </div>
      <div class="status"></div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <p>Hello! Ask me anything.</p>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function processInline(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function formatBotReply(text) {
      if (!text) return "<p>No response</p>";

      text = escapeHtml(text);

      const codeBlocks = [];
      text = text.replace(/```([\s\S]*?)```/g, function(match, code) {
        const token = `__CODEBLOCK_${codeBlocks.length}__`;
        codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
        return token;
      });

      const lines = text.split("\n");
      let html = "";
      let inUl = false;
      let inOl = false;

      function closeLists() {
        if (inUl) {
          html += "</ul>";
          inUl = false;
        }
        if (inOl) {
          html += "</ol>";
          inOl = false;
        }
      }

      for (let rawLine of lines) {
        let line = rawLine.trim();

        if (!line) {
          closeLists();
          continue;
        }

        if (line.startsWith("### ")) {
          closeLists();
          html += `<h3>${processInline(line.slice(4))}</h3>`;
        } else if (line.startsWith("## ")) {
          closeLists();
          html += `<h2>${processInline(line.slice(3))}</h2>`;
        } else if (line.startsWith("# ")) {
          closeLists();
          html += `<h1>${processInline(line.slice(2))}</h1>`;
        } else if (line.startsWith("- ") || line.startsWith("* ")) {
          if (inOl) {
            html += "</ol>";
            inOl = false;
          }
          if (!inUl) {
            html += "<ul>";
            inUl = true;
          }
          html += `<li>${processInline(line.slice(2))}</li>`;
        } else if (/^\d+\.\s/.test(line)) {
          if (inUl) {
            html += "</ul>";
            inUl = false;
          }
          if (!inOl) {
            html += "<ol>";
            inOl = true;
          }
          html += `<li>${processInline(line.replace(/^\d+\.\s/, ""))}</li>`;
        } else if (/^__CODEBLOCK_\d+__$/.test(line)) {
          closeLists();
          const index = Number(line.match(/\d+/)[0]);
          html += codeBlocks[index];
        } else {
          closeLists();
          html += `<p>${processInline(line)}</p>`;
        }
      }

      closeLists();

      html = html.replace(/__CODEBLOCK_(\d+)__/g, function(match, index) {
        return codeBlocks[Number(index)];
      });

      return html;
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.textContent = text;
      messages.appendChild(userDiv);

      input.value = "";

      const botLoading = document.createElement("div");
      botLoading.className = "message bot";
      botLoading.innerHTML = "<p>Typing...</p>";
      messages.appendChild(botLoading);

      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("http://localhost:3001/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        const reply = data.reply || data.error || "No response";
        botLoading.innerHTML = formatBotReply(reply);
      } catch (error) {
        botLoading.innerHTML = "<p>Error connecting to server</p>";
      }

      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
