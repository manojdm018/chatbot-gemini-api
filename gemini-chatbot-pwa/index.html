<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --panel: rgba(255, 255, 255, 0.75);
      --panel-solid: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.2);
      --user: #111827;
      --bot: #ffffff;
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #e0f2fe 0%, transparent 30%),
        radial-gradient(circle at top right, #ede9fe 0%, transparent 28%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .chatbox {
      width: 100%;
      max-width: 780px;
      height: 85vh;
      max-height: 760px;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.5);
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-left p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: transparent;
    }

    .message {
      max-width: 78%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.55);
    }

    input {
      flex: 1;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    button {
      border: none;
      background: #0f172a;
      color: white;
      padding: 0 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:active {
      transform: scale(0.98);
    }

    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.25);
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .chatbox {
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }

      .message {
        max-width: 88%;
      }

      .header {
        padding: 18px 16px;
      }

      .messages {
        padding: 18px 16px;
      }

      .input-area {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="chatbox">
    <div class="header">
      <div class="header-left">
        <h1>Gemini Chatbot</h1>
        <p>Minimal AI conversation interface</p>
      </div>
      <div class="status"></div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">Hello! Ask me anything.</div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement("div");
      userDiv.className = "message user";
      userDiv.textContent = text;
      messages.appendChild(userDiv);

      input.value = "";

      const botLoading = document.createElement("div");
      botLoading.className = "message bot";
      botLoading.textContent = "Typing...";
      messages.appendChild(botLoading);

      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("http://localhost:3001/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        botLoading.textContent = data.reply || data.error || "No response";
      } catch (error) {
        botLoading.textContent = "Error connecting to server";
      }

      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
